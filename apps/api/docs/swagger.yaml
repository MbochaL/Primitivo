basePath: /api/v1
definitions:
  dto.ActualizarInstitucionRequest:
    properties:
      activa:
        type: boolean
      nombre:
        type: string
    required:
    - activa
    - nombre
    type: object
  dto.ActualizarUsuarioRequest:
    properties:
      activo:
        type: boolean
      email:
        type: string
      rol:
        enum:
        - administrador
        - operador
        type: string
    required:
    - activo
    - email
    - rol
    type: object
  dto.CrearInstitucionRequest:
    properties:
      nombre:
        type: string
    required:
    - nombre
    type: object
  dto.CrearUsuarioRequest:
    properties:
      email:
        type: string
      password:
        minLength: 8
        type: string
      rol:
        enum:
        - administrador
        - operador
        type: string
    required:
    - email
    - password
    - rol
    type: object
  dto.InstitucionResponse:
    properties:
      activa:
        type: boolean
      created_at:
        type: string
      id:
        type: string
      nombre:
        type: string
    type: object
  dto.LoginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  dto.RefreshRequest:
    properties:
      refresh_token:
        type: string
    required:
    - refresh_token
    type: object
  dto.ResetPasswordRequest:
    properties:
      password:
        minLength: 8
        type: string
    required:
    - password
    type: object
  dto.TokenResponse:
    properties:
      access_token:
        type: string
      refresh_token:
        type: string
      token_type:
        type: string
    type: object
  dto.UsuarioResponse:
    properties:
      activo:
        type: boolean
      email:
        type: string
      id:
        type: string
      rol:
        type: string
    type: object
  handler.HealthResponse:
    properties:
      db:
        type: string
      status:
        type: string
    type: object
  response.ErrorBody:
    properties:
      codigo:
        type: string
      mensaje:
        type: string
    type: object
  response.ErrorResponse:
    properties:
      error:
        $ref: '#/definitions/response.ErrorBody'
    type: object
host: localhost:8080
info:
  contact: {}
  description: API de fidelización y beneficios de Primitivo (pan · café · cocina).
  title: Primitivo API
  version: "1.0"
paths:
  /auth/login:
    post:
      consumes:
      - application/json
      parameters:
      - description: Credenciales
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.TokenResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      summary: Iniciar sesión
      tags:
      - auth
  /auth/refresh:
    post:
      consumes:
      - application/json
      parameters:
      - description: Refresh token
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.RefreshRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.TokenResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      summary: Renovar tokens
      tags:
      - auth
  /health:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.HealthResponse'
      summary: Healthcheck del servicio
      tags:
      - health
  /instituciones:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/dto.InstitucionResponse'
            type: array
      security:
      - BearerAuth: []
      summary: Listar instituciones
      tags:
      - instituciones
    post:
      consumes:
      - application/json
      parameters:
      - description: Datos de la institución
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.CrearInstitucionRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.InstitucionResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Crear una institución
      tags:
      - instituciones
  /instituciones/{id}:
    put:
      consumes:
      - application/json
      parameters:
      - description: ID de la institución
        in: path
        name: id
        required: true
        type: string
      - description: Datos a actualizar
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.ActualizarInstitucionRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.InstitucionResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Actualizar una institución
      tags:
      - instituciones
  /usuarios:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/dto.UsuarioResponse'
            type: array
      security:
      - BearerAuth: []
      summary: Listar usuarios del sistema
      tags:
      - usuarios
    post:
      consumes:
      - application/json
      parameters:
      - description: Datos del usuario
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.CrearUsuarioRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.UsuarioResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Crear un usuario del sistema
      tags:
      - usuarios
  /usuarios/{id}:
    put:
      consumes:
      - application/json
      parameters:
      - description: ID del usuario
        in: path
        name: id
        required: true
        type: string
      - description: Datos a actualizar
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.ActualizarUsuarioRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.UsuarioResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Actualizar un usuario del sistema
      tags:
      - usuarios
  /usuarios/{id}/password:
    put:
      consumes:
      - application/json
      parameters:
      - description: ID del usuario
        in: path
        name: id
        required: true
        type: string
      - description: Nueva contraseña
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.ResetPasswordRequest'
      produces:
      - application/json
      responses:
        "204":
          description: Sin contenido
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Resetear la contraseña de un usuario
      tags:
      - usuarios
securityDefinitions:
  BearerAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
