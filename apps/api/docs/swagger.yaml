basePath: /api/v1
definitions:
  dto.ActualizarCategoriaRequest:
    properties:
      nombre:
        type: string
      orden:
        type: integer
      seccion:
        enum:
        - Cafetería
        - Cocina de mediodía
        type: string
    required:
    - nombre
    - seccion
    type: object
  dto.ActualizarClienteRequest:
    properties:
      email:
        type: string
      institucion_id:
        type: string
      nombre:
        type: string
    required:
    - nombre
    type: object
  dto.ActualizarInstitucionRequest:
    properties:
      activa:
        type: boolean
      nombre:
        type: string
    required:
    - activa
    - nombre
    type: object
  dto.ActualizarProductoRequest:
    properties:
      activo:
        type: boolean
      categoria_id:
        type: string
      descripcion:
        type: string
      es_infusion:
        type: boolean
      nombre:
        type: string
      precio:
        minimum: 0
        type: integer
    required:
    - categoria_id
    - nombre
    type: object
  dto.ActualizarUsuarioRequest:
    properties:
      activo:
        type: boolean
      email:
        type: string
      rol:
        enum:
        - administrador
        - operador
        type: string
    required:
    - activo
    - email
    - rol
    type: object
  dto.BeneficioDisponibleResponse:
    properties:
      alcanzado:
        type: boolean
      beneficio_nombre:
        type: string
      condicion_id:
        type: string
      reinicia_contador:
        type: boolean
      tipo_descuento:
        type: string
      umbral_infusiones:
        type: integer
      valor_descuento:
        type: integer
    type: object
  dto.CategoriaAdminResponse:
    properties:
      id:
        type: string
      nombre:
        type: string
      orden:
        type: integer
      seccion:
        type: string
    type: object
  dto.CategoriaMenuResponse:
    properties:
      id:
        type: string
      nombre:
        type: string
      productos:
        items:
          $ref: '#/definitions/dto.ProductoResponse'
        type: array
      seccion:
        type: string
    type: object
  dto.ClienteResponse:
    properties:
      contador_infusiones:
        type: integer
      created_at:
        type: string
      dni:
        type: string
      email:
        type: string
      id:
        type: string
      institucion_id:
        type: string
      institucion_nombre:
        type: string
      nombre:
        type: string
    type: object
  dto.CompraRegistradaResponse:
    properties:
      descuento:
        type: integer
      fecha:
        type: string
      id:
        type: string
      subtotal:
        type: integer
      total:
        type: integer
    type: object
  dto.CompraResponse:
    properties:
      descuento:
        type: integer
      fecha:
        type: string
      id:
        type: string
      subtotal:
        type: integer
      total:
        type: integer
    type: object
  dto.CrearCategoriaRequest:
    properties:
      nombre:
        type: string
      orden:
        type: integer
      seccion:
        enum:
        - Cafetería
        - Cocina de mediodía
        type: string
    required:
    - nombre
    - seccion
    type: object
  dto.CrearClienteRequest:
    properties:
      dni:
        type: string
      email:
        type: string
      institucion_id:
        type: string
      nombre:
        type: string
    required:
    - dni
    - nombre
    type: object
  dto.CrearInstitucionRequest:
    properties:
      nombre:
        type: string
    required:
    - nombre
    type: object
  dto.CrearProductoRequest:
    properties:
      categoria_id:
        type: string
      descripcion:
        type: string
      es_infusion:
        type: boolean
      nombre:
        type: string
      precio:
        minimum: 0
        type: integer
    required:
    - categoria_id
    - nombre
    type: object
  dto.CrearUsuarioRequest:
    properties:
      email:
        type: string
      password:
        minLength: 8
        type: string
      rol:
        enum:
        - administrador
        - operador
        type: string
    required:
    - email
    - password
    - rol
    type: object
  dto.InstitucionResponse:
    properties:
      activa:
        type: boolean
      created_at:
        type: string
      id:
        type: string
      nombre:
        type: string
    type: object
  dto.ItemCompraRequest:
    properties:
      cantidad:
        minimum: 1
        type: integer
      producto_id:
        type: string
    required:
    - cantidad
    - producto_id
    type: object
  dto.LoginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  dto.ProductoAdminResponse:
    properties:
      activo:
        type: boolean
      categoria_id:
        type: string
      descripcion:
        type: string
      es_infusion:
        type: boolean
      id:
        type: string
      nombre:
        type: string
      precio:
        type: integer
    type: object
  dto.ProductoResponse:
    properties:
      es_infusion:
        type: boolean
      id:
        type: string
      nombre:
        type: string
      precio:
        type: integer
    type: object
  dto.RefreshRequest:
    properties:
      refresh_token:
        type: string
    required:
    - refresh_token
    type: object
  dto.RegistrarCompraRequest:
    properties:
      cliente_id:
        type: string
      condicion_id:
        type: string
      items:
        items:
          $ref: '#/definitions/dto.ItemCompraRequest'
        minItems: 1
        type: array
    required:
    - cliente_id
    - items
    type: object
  dto.ResetPasswordRequest:
    properties:
      password:
        minLength: 8
        type: string
    required:
    - password
    type: object
  dto.TokenResponse:
    properties:
      access_token:
        type: string
      refresh_token:
        type: string
      token_type:
        type: string
    type: object
  dto.UsuarioResponse:
    properties:
      activo:
        type: boolean
      email:
        type: string
      id:
        type: string
      rol:
        type: string
    type: object
  handler.HealthResponse:
    properties:
      db:
        type: string
      status:
        type: string
    type: object
  response.ErrorBody:
    properties:
      codigo:
        type: string
      mensaje:
        type: string
    type: object
  response.ErrorResponse:
    properties:
      error:
        $ref: '#/definitions/response.ErrorBody'
    type: object
host: localhost:8080
info:
  contact: {}
  description: API de fidelización y beneficios de Primitivo (pan · café · cocina).
  title: Primitivo API
  version: "1.0"
paths:
  /auth/login:
    post:
      consumes:
      - application/json
      parameters:
      - description: Credenciales
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.TokenResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      summary: Iniciar sesión
      tags:
      - auth
  /auth/refresh:
    post:
      consumes:
      - application/json
      parameters:
      - description: Refresh token
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.RefreshRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.TokenResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      summary: Renovar tokens
      tags:
      - auth
  /categorias:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/dto.CategoriaAdminResponse'
            type: array
      security:
      - BearerAuth: []
      summary: Lista todas las categorías (admin)
      tags:
      - menu
    post:
      consumes:
      - application/json
      parameters:
      - description: Categoría
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.CrearCategoriaRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.CategoriaAdminResponse'
      security:
      - BearerAuth: []
      summary: Crear categoría (admin)
      tags:
      - menu
  /categorias/{id}:
    put:
      consumes:
      - application/json
      parameters:
      - description: ID categoría
        in: path
        name: id
        required: true
        type: string
      - description: Categoría
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.ActualizarCategoriaRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.CategoriaAdminResponse'
      security:
      - BearerAuth: []
      summary: Actualizar categoría (admin)
      tags:
      - menu
  /clientes:
    get:
      parameters:
      - description: Buscar por DNI exacto (búsqueda principal del dashboard)
        in: query
        name: dni
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/dto.ClienteResponse'
            type: array
      security:
      - BearerAuth: []
      summary: Listar clientes (o buscar por DNI con ?dni=)
      tags:
      - clientes
    post:
      consumes:
      - application/json
      parameters:
      - description: Datos del cliente
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.CrearClienteRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.ClienteResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Registrar un cliente
      tags:
      - clientes
  /clientes/{id}:
    get:
      parameters:
      - description: ID del cliente
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.ClienteResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Obtener un cliente por ID
      tags:
      - clientes
    put:
      consumes:
      - application/json
      parameters:
      - description: ID del cliente
        in: path
        name: id
        required: true
        type: string
      - description: Datos a actualizar
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.ActualizarClienteRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.ClienteResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Actualizar un cliente
      tags:
      - clientes
  /clientes/{id}/beneficios:
    get:
      parameters:
      - description: ID del cliente
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/dto.BeneficioDisponibleResponse'
            type: array
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Beneficios disponibles del cliente
      tags:
      - clientes
  /clientes/{id}/historial:
    get:
      parameters:
      - description: ID del cliente
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/dto.CompraResponse'
            type: array
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Historial de compras del cliente
      tags:
      - clientes
  /compras:
    post:
      consumes:
      - application/json
      parameters:
      - description: Pedido
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.RegistrarCompraRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.CompraRegistradaResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Registrar una compra (calcula total y aplica beneficio si corresponde)
      tags:
      - compras
  /health:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.HealthResponse'
      summary: Healthcheck del servicio
      tags:
      - health
  /instituciones:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/dto.InstitucionResponse'
            type: array
      security:
      - BearerAuth: []
      summary: Listar instituciones
      tags:
      - instituciones
    post:
      consumes:
      - application/json
      parameters:
      - description: Datos de la institución
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.CrearInstitucionRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.InstitucionResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Crear una institución
      tags:
      - instituciones
  /instituciones/{id}:
    put:
      consumes:
      - application/json
      parameters:
      - description: ID de la institución
        in: path
        name: id
        required: true
        type: string
      - description: Datos a actualizar
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.ActualizarInstitucionRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.InstitucionResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Actualizar una institución
      tags:
      - instituciones
  /menu:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/dto.CategoriaMenuResponse'
            type: array
      security:
      - BearerAuth: []
      summary: Menú completo agrupado por categoría (solo activos)
      tags:
      - menu
  /productos:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/dto.ProductoAdminResponse'
            type: array
      security:
      - BearerAuth: []
      summary: Lista todos los productos incluyendo inactivos (admin)
      tags:
      - menu
    post:
      consumes:
      - application/json
      parameters:
      - description: Producto
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.CrearProductoRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.ProductoAdminResponse'
      security:
      - BearerAuth: []
      summary: Crear producto (admin)
      tags:
      - menu
  /productos/{id}:
    delete:
      parameters:
      - description: ID producto
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.ProductoAdminResponse'
      security:
      - BearerAuth: []
      summary: Baja lógica de producto (admin)
      tags:
      - menu
    put:
      consumes:
      - application/json
      parameters:
      - description: ID producto
        in: path
        name: id
        required: true
        type: string
      - description: Producto
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.ActualizarProductoRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.ProductoAdminResponse'
      security:
      - BearerAuth: []
      summary: Actualizar producto (admin)
      tags:
      - menu
  /usuarios:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/dto.UsuarioResponse'
            type: array
      security:
      - BearerAuth: []
      summary: Listar usuarios del sistema
      tags:
      - usuarios
    post:
      consumes:
      - application/json
      parameters:
      - description: Datos del usuario
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.CrearUsuarioRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.UsuarioResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Crear un usuario del sistema
      tags:
      - usuarios
  /usuarios/{id}:
    put:
      consumes:
      - application/json
      parameters:
      - description: ID del usuario
        in: path
        name: id
        required: true
        type: string
      - description: Datos a actualizar
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.ActualizarUsuarioRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.UsuarioResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Actualizar un usuario del sistema
      tags:
      - usuarios
  /usuarios/{id}/password:
    put:
      consumes:
      - application/json
      parameters:
      - description: ID del usuario
        in: path
        name: id
        required: true
        type: string
      - description: Nueva contraseña
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.ResetPasswordRequest'
      produces:
      - application/json
      responses:
        "204":
          description: Sin contenido
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Resetear la contraseña de un usuario
      tags:
      - usuarios
securityDefinitions:
  BearerAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
