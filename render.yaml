# Blueprint de Render para la API de Primitivo (Go + Gin, vía Docker).
# La base de datos NO se define acá: se usa Neon (gestionada). Ver docs/DEPLOY.md.
services:
  - type: web
    name: primitivo-api
    runtime: docker
    rootDir: apps/api
    dockerfilePath: ./Dockerfile
    plan: free
    region: oregon
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: APP_ENV
        value: production
      # Render genera un secreto fuerte automáticamente.
      - key: JWT_SECRET
        generateValue: true
      # Se cargan a mano en el dashboard de Render (no se versionan).
      - key: DATABASE_URL
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
